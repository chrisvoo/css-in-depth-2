<!doctype html>
<head>
  <style>
    body {
      font-size: 16px;
    }

    ul {
      font-size: 0.8em;
    }

    /* targets all unordered lists within an unordered list. This fixes the problem, though it’s not ideal;
    you’re setting a value and then immediately overriding it with another rule. */
    ul ul {
      font-size: 1em;
    }
  </style>
</head>

<body>
  <ul>
    <li>
      Top level
      <ul>
        <li>
          Second level
          <ul>
            <li>
              Third level
              <ul>
                <li>
                  Fourth level
                  <ul>
                    <li>Fifth level</li>
                  </ul>
                </li>
              </ul>
            </li>
          </ul>
        </li>
      </ul>
    </li>
  </ul>
</body>
